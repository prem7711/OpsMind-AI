services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - sentinel_pg_data:/var/lib/postgresql/data

volumes:
  sentinel_pg_data:
# Chroma runs embedded (PersistentClient) against CHROMA_PATH — no separate service needed for local dev.
